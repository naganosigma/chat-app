<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="ΣChat" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="theme-color" content="#0d0f14" />
<link rel="manifest" href="/manifest.json" />
<link rel="apple-touch-icon" href="/icon-192.png" />
<title>シグマChat</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;height:-webkit-fill-available}
:root{
  --bg:#0d0f14;--surface:#161922;--s2:#1e2230;--s3:#252a3a;
  --border:rgba(255,255,255,0.08);--accent:#5b8def;--green:#3ecf8e;
  --red:#f06060;--text:#e8eaf0;--muted:#7a8099;--dim:#4a5068;
  --r:14px;--rsm:10px;--shadow:0 8px 32px rgba(0,0,0,0.5);
  --font:'Noto Sans JP',sans-serif;--mono:'DM Mono',monospace;
  --ease:0.2s cubic-bezier(0.4,0,0.2,1);
  --sat:env(safe-area-inset-top,0px);--sab:env(safe-area-inset-bottom,0px);
  --sal:env(safe-area-inset-left,0px);--sar:env(safe-area-inset-right,0px);
}
body{font-family:var(--font);background:var(--bg);color:var(--text);
  height:100vh;height:-webkit-fill-available;overflow:hidden;
  -webkit-font-smoothing:antialiased}
.screen{display:none;width:100%;height:100%}
.screen.active{display:flex}

/* ── JOIN ─────────────────────── */
#joinScreen{
  flex-direction:column;align-items:center;justify-content:center;
  padding:24px;
  padding-top:calc(24px + var(--sat));padding-bottom:calc(24px + var(--sab));
  background:radial-gradient(ellipse 90% 50% at 50% 0%,rgba(91,141,239,.18) 0%,transparent 70%),var(--bg);
  overflow-y:auto;-webkit-overflow-scrolling:touch
}
.join-card{
  width:100%;max-width:380px;padding:40px 28px;
  background:var(--surface);border:1px solid var(--border);
  border-radius:24px;box-shadow:var(--shadow);animation:fadeUp .45s ease
}
.join-logo{display:flex;align-items:center;gap:10px;margin-bottom:6px}
.logo-sigma{
  width:44px;height:44px;border-radius:12px;
  background:linear-gradient(135deg,rgba(91,141,239,.22),rgba(62,207,142,.12));
  border:1px solid rgba(91,141,239,.4);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;font-weight:700;color:var(--accent)
}
.logo-text{font-size:22px;font-weight:700;letter-spacing:-.3px}
.logo-text span{color:var(--accent)}
.join-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.field{margin-bottom:15px}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:.8px;
  text-transform:uppercase;color:var(--muted);margin-bottom:7px}
.field input{
  width:100%;padding:14px 15px;
  background:var(--s2);border:1.5px solid var(--border);border-radius:var(--rsm);
  color:var(--text);font-family:var(--font);font-size:16px;
  outline:none;-webkit-appearance:none;transition:border-color var(--ease)
}
.field input:focus{border-color:var(--accent)}
.field input::placeholder{color:var(--dim)}
.btn-p{
  width:100%;padding:15px;background:var(--accent);color:#fff;
  border:none;border-radius:var(--rsm);
  font-family:var(--font);font-size:16px;font-weight:700;
  cursor:pointer;margin-top:6px;-webkit-appearance:none;
  transition:opacity var(--ease),transform var(--ease)
}
.btn-p:active{opacity:.78;transform:scale(.97)}
.join-err{margin-top:12px;font-size:13px;color:var(--red);text-align:center;min-height:18px}
.pwa-tip{
  margin-top:18px;padding:11px 14px;
  background:rgba(91,141,239,.08);border:1px solid rgba(91,141,239,.2);
  border-radius:var(--rsm);font-size:12px;color:var(--muted);
  line-height:1.6;text-align:center
}

/* ── CHAT ─────────────────────── */
#chatScreen{flex-direction:column;height:100%;height:-webkit-fill-available}
.chat-hd{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px;padding-top:calc(12px + var(--sat));
  background:var(--surface);border-bottom:1px solid var(--border);
  flex-shrink:0;z-index:10
}
.hd-logo{font-size:18px;font-weight:700}
.hd-logo span{color:var(--accent)}
.hd-status{font-size:12px;color:var(--muted)}
.icon-btn{
  width:40px;height:40px;border-radius:10px;
  border:1px solid var(--border);background:var(--s2);
  color:var(--muted);font-size:18px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;-webkit-appearance:none;transition:all var(--ease)
}
.icon-btn:active{background:var(--s3);transform:scale(.92)}

/* messages */
.messages{
  flex:1;overflow-y:auto;overflow-x:hidden;
  padding:12px 14px;display:flex;flex-direction:column;gap:2px;
  -webkit-overflow-scrolling:touch;overscroll-behavior-y:contain
}
.messages::-webkit-scrollbar{display:none}

.msg{display:flex;gap:8px;padding:3px 0;animation:fadeIn .18s ease}
.msg.own{flex-direction:row-reverse}
.msg-av{
  width:30px;height:30px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:11px;font-weight:700;flex-shrink:0;align-self:flex-end
}
.msg-body{max-width:74%}
.msg.own .msg-body{align-items:flex-end;display:flex;flex-direction:column}
.msg-meta{font-size:10px;color:var(--dim);margin-bottom:3px;
  display:flex;gap:5px;align-items:baseline}
.msg.own .msg-meta{flex-direction:row-reverse}
.msg-name{font-weight:700;color:var(--muted);white-space:normal;word-break:break-all}
.msg-time{font-family:var(--mono);font-size:10px}
.msg-bubble{
  padding:9px 12px;border-radius:16px;
  font-size:14px;line-height:1.55;word-break:break-word;
  background:var(--s2);border:1px solid var(--border)
}
.msg.own .msg-bubble{
  background:rgba(91,141,239,.18);
  border-color:rgba(91,141,239,.28)
}
.msg-bubble img{max-width:210px;max-height:190px;border-radius:10px;display:block;cursor:pointer}
.msg-sys{text-align:center;font-size:11px;color:var(--dim);padding:5px 0;font-style:italic}
/* 既読 */
.msg-reads{
  font-size:10px;color:var(--dim);margin-top:4px;
  display:flex;align-items:center;gap:3px;
  cursor:default;user-select:none
}
.msg.own .msg-reads{justify-content:flex-end}
.read-count{color:var(--accent);font-weight:600}


/* input area */
.input-area{
  flex-shrink:0;background:var(--surface);border-top:1px solid var(--border);
  padding:8px 12px;padding-bottom:calc(8px + var(--sab))
}
.toolbar{display:flex;gap:6px;margin-bottom:8px}
.tool-btn{
  padding:7px 12px;border-radius:20px;
  border:1px solid var(--border);background:var(--s2);color:var(--muted);
  font-family:var(--font);font-size:12px;font-weight:500;
  display:flex;align-items:center;gap:4px;
  cursor:pointer;white-space:nowrap;-webkit-appearance:none;
  transition:all var(--ease)
}
.tool-btn:active{background:var(--s3);color:var(--accent)}
.input-row{display:flex;gap:8px;align-items:flex-end}
.msg-input{
  flex:1;min-height:44px;max-height:108px;
  padding:12px 14px;background:var(--s2);
  border:1.5px solid var(--border);border-radius:22px;
  color:var(--text);font-family:var(--font);font-size:16px;
  outline:none;resize:none;line-height:1.4;
  overflow-y:auto;-webkit-appearance:none;
  transition:border-color var(--ease)
}
.msg-input:focus{border-color:var(--accent)}
.msg-input::placeholder{color:var(--dim)}
.send-btn{
  width:44px;height:44px;flex-shrink:0;border-radius:50%;
  border:none;background:var(--accent);color:#fff;font-size:18px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;-webkit-appearance:none;
  transition:opacity var(--ease),transform var(--ease)
}
.send-btn:active{opacity:.78;transform:scale(.9)}

/* users drawer */
.backdrop{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.52);z-index:40;backdrop-filter:blur(3px)
}
.backdrop.show{display:block}
.users-panel{
  position:fixed;top:0;right:0;bottom:0;width:260px;
  background:var(--surface);border-left:1px solid var(--border);
  z-index:50;transform:translateX(100%);
  transition:transform .28s cubic-bezier(.4,0,.2,1);
  display:flex;flex-direction:column;
  padding-top:var(--sat);padding-bottom:var(--sab)
}
.users-panel.open{transform:translateX(0)}
.panel-hd{
  padding:16px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between
}
.panel-title{font-size:15px;font-weight:700}
.panel-close{
  width:30px;height:30px;border-radius:50%;
  border:none;background:var(--s3);color:var(--muted);
  font-size:20px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;-webkit-appearance:none
}
.panel-sec{
  padding:14px 18px 6px;font-size:10px;font-weight:700;
  letter-spacing:.8px;text-transform:uppercase;color:var(--dim)
}
.user-list{flex:1;overflow-y:auto;padding:0 10px 12px;-webkit-overflow-scrolling:touch}
.user-item{
  display:flex;align-items:center;gap:10px;
  padding:10px;border-radius:10px;cursor:pointer
}
.user-item:active{background:var(--s2)}
.user-item.self{opacity:.55;cursor:default}
.user-item.self:active{background:transparent}
.av{
  width:34px;height:34px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:13px;font-weight:700;flex-shrink:0;position:relative
}
.av::after{
  content:'';position:absolute;bottom:1px;right:1px;
  width:9px;height:9px;border-radius:50%;
  background:var(--green);border:2px solid var(--surface)
}
.uname{font-size:14px;font-weight:500;flex:1;min-width:0;word-break:break-all}
.call-sm{
  width:34px;height:34px;border-radius:50%;border:none;
  background:var(--s3);color:var(--green);font-size:15px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;-webkit-appearance:none
}
.call-sm:active{background:var(--green);color:#fff;transform:scale(.88)}

/* overlay */
.overlay{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.82);backdrop-filter:blur(8px);
  z-index:100;align-items:center;justify-content:center;
  padding:20px;
  padding-top:calc(20px + var(--sat));padding-bottom:calc(20px + var(--sab))
}
.overlay.show{display:flex}

/* incoming */
.incoming-box{
  background:var(--surface);border:1px solid var(--border);border-radius:28px;
  padding:36px 36px;text-align:center;width:100%;max-width:300px;
  box-shadow:var(--shadow);animation:fadeUp .3s ease
}
.ring-em{font-size:48px;margin-bottom:12px;animation:ring .8s ease-in-out infinite}
.inc-name{font-size:22px;font-weight:700;margin-bottom:4px}
.inc-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.inc-btns{display:flex;gap:14px;justify-content:center}
.btn-acc,.btn-rej{
  flex:1;padding:14px;border-radius:50px;border:none;
  font-family:var(--font);font-size:15px;font-weight:700;
  cursor:pointer;-webkit-appearance:none;transition:opacity var(--ease)
}
.btn-acc{background:var(--green);color:#fff}
.btn-rej{background:var(--red);color:#fff}
.btn-acc:active,.btn-rej:active{opacity:.74}

/* call modal */
.call-box{
  background:var(--surface);border:1px solid var(--border);border-radius:22px;
  width:100%;max-width:480px;overflow:hidden;
  box-shadow:var(--shadow);animation:fadeUp .3s ease
}
.call-hd{
  padding:13px 18px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between
}
.call-title{font-size:15px;font-weight:700}
.call-timer{font-family:var(--mono);font-size:14px;color:var(--green)}
.vid-grid{display:grid;grid-template-columns:1fr 1fr;gap:2px;background:#000}
.vid-wrap{
  position:relative;background:var(--s2);
  aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;overflow:hidden
}
.vid-wrap video{width:100%;height:100%;object-fit:cover;display:none}
.vid-icon{font-size:32px;opacity:.22}
.vid-lbl{
  position:absolute;bottom:7px;left:9px;font-size:11px;font-weight:600;
  background:rgba(0,0,0,.65);padding:2px 7px;border-radius:4px
}
.call-ctrls{padding:16px 18px;display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.ctrl{display:flex;flex-direction:column;align-items:center;gap:4px}
.ctrl button{
  width:52px;height:52px;border-radius:50%;border:none;font-size:22px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;background:var(--s3);color:var(--text);
  -webkit-appearance:none;transition:all var(--ease)
}
.ctrl button:active{transform:scale(.86)}
.ctrl button.on{background:var(--accent);color:#fff}
.ctrl button.end-btn{background:var(--red);color:#fff}
.ctrl-lbl{font-size:10px;color:var(--dim)}

/* camera modal */
.cam-box{
  background:var(--surface);border:1px solid var(--border);border-radius:22px;
  width:100%;max-width:400px;overflow:hidden;
  box-shadow:var(--shadow);animation:fadeUp .3s ease
}
.cam-hd{
  padding:13px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between
}
.cam-hd h3{font-size:15px;font-weight:700}
.close-x{
  width:30px;height:30px;border-radius:50%;border:none;
  background:var(--s3);color:var(--muted);font-size:20px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;-webkit-appearance:none
}
.close-x:active{background:var(--red);color:#fff}
#camPreview,#camCanvas{width:100%;display:block;background:#000;max-height:55vmax;object-fit:cover}
#camCanvas{display:none}
.cam-btns{padding:12px 16px;display:flex;gap:8px;flex-wrap:wrap;justify-content:center}
.btn-sec{
  padding:10px 18px;border-radius:10px;border:1px solid var(--border);
  background:var(--s2);color:var(--text);
  font-family:var(--font);font-size:14px;cursor:pointer;-webkit-appearance:none
}
.btn-sec:active{background:var(--s3)}
.btn-act{
  padding:10px 22px;border-radius:10px;border:none;
  background:var(--accent);color:#fff;
  font-family:var(--font);font-size:14px;font-weight:700;
  cursor:pointer;-webkit-appearance:none;transition:opacity var(--ease)
}
.btn-act:active{opacity:.74}

/* img fullscreen */
.img-full{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.95);z-index:200;
  align-items:center;justify-content:center;cursor:zoom-out
}
.img-full.show{display:flex}
.img-full img{max-width:95vw;max-height:90vh;border-radius:12px;object-fit:contain}

/* animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
@keyframes ring{0%,100%{transform:rotate(-12deg)}50%{transform:rotate(12deg)}}

.hidden{display:none!important}
</style>
</head>
<body>

<!-- JOIN -->
<div class="screen active" id="joinScreen">
  <div class="join-card">
    <div class="join-logo">
      <div class="logo-sigma">Σ</div>
      <div class="logo-text">シグマ<span>Chat</span></div>
    </div>
    <div class="join-sub">チームチャット・音声/ビデオ通話</div>
    <div class="field">
      <label>ユーザー名</label>
      <input type="text" id="usernameInput" placeholder="例：田中 太郎"
             maxlength="20" autocorrect="off" autocapitalize="off" spellcheck="false" />
    </div>
    <!-- 招待コードは固定のため非表示 -->
    <input type="hidden" id="codeInput" />
    <button class="btn-p" id="joinBtn">参加する →</button>
    <div class="join-err" id="joinErr"></div>
    <div class="pwa-tip" id="pwaTip">📱 ホーム画面に追加するとアプリとして使えます</div>
  </div>
</div>

<!-- CHAT -->
<div class="screen" id="chatScreen">
  <header class="chat-hd">
    <div>
      <div class="hd-logo">Σ<span>Chat</span></div>
      <div class="hd-status" id="hdStatus">接続中...</div>
    </div>
    <button class="icon-btn" onclick="openPanel()" title="メンバー">👥</button>
  </header>

  <div class="messages" id="messages"></div>

  <div class="input-area">
    <div class="toolbar">
      <button class="tool-btn" onclick="openFilePicker()">📎 画像</button>
      <button class="tool-btn" onclick="openCamera()">📷 カメラ</button>
    </div>
    <div class="input-row">
      <textarea class="msg-input" id="msgInput" placeholder="メッセージを入力..." rows="1"></textarea>
      <button class="send-btn" id="sendBtn">➤</button>
    </div>
  </div>
</div>

<!-- ユーザーパネル -->
<div class="backdrop" id="backdrop" onclick="closePanel()"></div>
<div class="users-panel" id="usersPanel">
  <div class="panel-hd">
    <span class="panel-title">メンバー</span>
    <button class="panel-close" onclick="closePanel()">×</button>
  </div>
  <div class="panel-sec">オンライン</div>
  <div class="user-list" id="userList"></div>
</div>

<!-- ファイル入力 -->
<input type="file" id="fileInput" accept="image/*" hidden />

<!-- 着信 -->
<div class="overlay" id="incomingOv">
  <div class="incoming-box">
    <div class="ring-em">📞</div>
    <div class="inc-name" id="callerName"></div>
    <div class="inc-sub">着信中...</div>
    <div class="inc-btns">
      <button class="btn-acc" id="acceptBtn">応答</button>
      <button class="btn-rej" id="rejectBtn">拒否</button>
    </div>
  </div>
</div>

<!-- 通話中 -->
<div class="overlay" id="callOv">
  <div class="call-box">
    <div class="call-hd">
      <div class="call-title" id="callTitle">通話中</div>
      <div class="call-timer" id="callTimer">00:00</div>
    </div>
    <div class="vid-grid">
      <div class="vid-wrap">
        <video id="remoteVid" autoplay playsinline></video>
        <div class="vid-icon" id="remoteIco">👤</div>
        <div class="vid-lbl" id="remoteLbl">相手</div>
      </div>
      <div class="vid-wrap">
        <video id="localVid" autoplay playsinline muted></video>
        <div class="vid-icon" id="localIco">🙂</div>
        <div class="vid-lbl">あなた</div>
      </div>
    </div>
    <div class="call-ctrls">
      <div class="ctrl">
        <button id="muteBtn" onclick="toggleMute()">🎙️</button>
        <span class="ctrl-lbl">ミュート</span>
      </div>
      <div class="ctrl">
        <button id="vidBtn" onclick="toggleVid()">📹</button>
        <span class="ctrl-lbl">カメラ</span>
      </div>
      <div class="ctrl">
        <button class="end-btn" onclick="endCall()">📵</button>
        <span class="ctrl-lbl">終了</span>
      </div>
    </div>
  </div>
</div>

<!-- カメラ -->
<div class="overlay" id="cameraOv">
  <div class="cam-box">
    <div class="cam-hd">
      <h3>📷 撮影</h3>
      <button class="close-x" onclick="closeCamera()">×</button>
    </div>
    <video id="camPreview" autoplay playsinline></video>
    <canvas id="camCanvas"></canvas>
    <div class="cam-btns">
      <button class="btn-sec" onclick="closeCamera()">キャンセル</button>
      <button class="btn-act" id="shootBtn" onclick="capturePhoto()">📸 撮影</button>
      <button class="btn-act hidden" id="sendPhotoBtn" onclick="sendCapturedPhoto()">送信 →</button>
      <button class="btn-sec hidden" id="retakeBtn" onclick="openCamera()">撮り直し</button>
    </div>
  </div>
</div>

<!-- 画像拡大 -->
<div class="img-full" id="imgFull" onclick="this.classList.remove('show')">
  <img id="imgFullSrc" src="" alt="" />
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
'use strict';

// ── 状態 ──────────────────────────────────────────────
let myUsername='', socket=null;
let pc=null, localStream=null;
let remoteCallerId=null, incomingOffer=null;
let callTarget={id:null,name:''};
let callSecs=0, callTimerID=null;
let muted=false, vidOff=false;
let camStream=null, capturedBlob=null;

// デバイス判定
const isIOS     = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
const isAndroid = /Android/.test(navigator.userAgent);

// ── カラー ──
const COLORS=['#5b8def','#e06c75','#e5c07b','#98c379','#c678dd','#56b6c2','#d19a66','#be5046'];
function ucolor(n){let h=0;for(const c of n)h=(h*31+c.charCodeAt(0))>>>0;return COLORS[h%COLORS.length]}
function ini(n){return(n||'?').slice(0,2).toUpperCase()}
function ft(ts){const d=new Date(ts);return`${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}

// ── 固定招待コード ────────────────────────────────────────
const FIXED_CODE = '0263272328';
document.getElementById('codeInput').value = FIXED_CODE;

// ── localStorage: ユーザー名の保存・復元 ───────────────────
(function(){
  const saved = localStorage.getItem('sigmachat_username');
  if(saved) document.getElementById('usernameInput').value = saved;
})();

// ── PWA ──────────────────────────────────────────────
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>navigator.serviceWorker.register('/sw.js').catch(()=>{}));
}
const isStandalone = window.matchMedia('(display-mode:standalone)').matches || window.navigator.standalone===true;
const tip = document.getElementById('pwaTip');
if(isStandalone){ tip.style.display='none'; }
else if(isIOS){ tip.textContent='iPhoneでは → Safariの「共有」→「ホーム画面に追加」でアプリとして使えます'; }
else if(isAndroid){ tip.textContent='Androidでは → Chromeメニュー「アプリをインストール」でアプリとして使えます'; }

// ── JOIN ─────────────────────────────────────────────
document.getElementById('joinBtn').addEventListener('click', handleJoin);
document.getElementById('usernameInput').addEventListener('keydown', e=>{ if(e.key==='Enter') handleJoin(); });

async function handleJoin(){
  const username=document.getElementById('usernameInput').value.trim();
  const code=document.getElementById('codeInput').value.trim();
  const errEl=document.getElementById('joinErr');
  errEl.textContent='';
  if(!username){errEl.textContent='ユーザー名を入力してください';return}
  const btn=document.getElementById('joinBtn');
  btn.textContent='接続中...';btn.disabled=true;
  try{
    const res=await fetch('/join',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({code})});
    const data=await res.json();
    if(!res.ok){errEl.textContent=data.error||'参加できませんでした';return}
    // ユーザー名をlocalStorageに保存
    localStorage.setItem('sigmachat_username', username);
    myUsername=username;
    initChat();
  }catch{errEl.textContent='サーバーに接続できません';}
  finally{btn.textContent='参加する →';btn.disabled=false;}
}

// ── CHAT INIT ─────────────────────────────────────────
function initChat(){
  document.getElementById('joinScreen').classList.remove('active');
  document.getElementById('chatScreen').classList.add('active');

  socket=io({transports:['websocket','polling']});
  socket.on('connect',()=>{
    socket.emit('user:join',{username:myUsername});
    document.getElementById('hdStatus').textContent='接続済み';
  });
  socket.on('disconnect',()=>{ document.getElementById('hdStatus').textContent='切断中...'; });
  socket.on('history', msgs => {
    document.getElementById('messages').innerHTML = '';
    msgs.forEach(renderMsg);
    // 既読状態を復元
    msgs.forEach(msg => {
      if (msg.readers && msg.readers.length > 0) {
        const el = document.getElementById('reads-' + msg.id);
        if (!el) return;
        const names = msg.readers.slice(0,3).map(n=>esc(n)).join('、');
        const more  = msg.readers.length > 3 ? `他${msg.readers.length-3}人` : '';
        el.innerHTML = `<span>👁</span><span class="read-count">${msg.readers.length}人既読</span><span style="color:var(--dim)">${names}${more}</span>`;
      }
      // 自分以外の過去メッセージも既読にする
      const isOwn = msg.userId === socket.id;
      if (!isOwn) socket.emit('read:ack', { msgId: msg.id });
    });
    scrollBtm();
  });
  socket.on('chat:message',msg=>{ renderMsg(msg); scrollBtm(); });
  socket.on('users:update',renderUsers);

  // 既読更新
  socket.on('read:update', ({ msgId, count, readers }) => {
    const el = document.getElementById('reads-' + msgId);
    if (!el) return;
    if (count === 0) { el.innerHTML = ''; return; }
    const names = readers.slice(0,3).map(n=>esc(n)).join('、');
    const more  = readers.length > 3 ? `他${readers.length-3}人` : '';
    el.innerHTML = `<span>👁</span><span class="read-count">${count}人既読</span><span style="color:var(--dim)">${names}${more}</span>`;
  });

  // 通話
  socket.on('call:incoming',({callerId,callerName,offer})=>{
    remoteCallerId=callerId; incomingOffer=offer;
    document.getElementById('callerName').textContent=callerName;
    document.getElementById('incomingOv').classList.add('show');
  });
  socket.on('call:answered',async({answer})=>{ if(pc) await pc.setRemoteDescription(new RTCSessionDescription(answer)); });
  socket.on('call:ice',async({candidate})=>{ if(pc&&candidate){try{await pc.addIceCandidate(new RTCIceCandidate(candidate))}catch{}} });
  socket.on('call:rejected',()=>{ alert(`${callTarget.name} が通話を拒否しました`); cleanupCall(); });
  socket.on('call:ended',()=>{ cleanupCall(); });

  // 送信
  document.getElementById('sendBtn').addEventListener('click', sendMsg);
  const inp=document.getElementById('msgInput');
  inp.addEventListener('keydown',e=>{ if(e.key==='Enter'&&!e.shiftKey&&!isIOS&&!isAndroid){e.preventDefault();sendMsg();} });
  inp.addEventListener('input',()=>{ inp.style.height='auto'; inp.style.height=Math.min(inp.scrollHeight,108)+'px'; });

  // ファイル
  const fi=document.getElementById('fileInput');
  fi.addEventListener('change',()=>{ if(fi.files[0]){uploadAndSend(fi.files[0]);fi.value='';} });

  // 着信ボタン
  document.getElementById('acceptBtn').addEventListener('click', acceptCall);
  document.getElementById('rejectBtn').addEventListener('click', rejectCall);

  // iOS キーボード対応
  if(isIOS){
    inp.addEventListener('focus',()=>setTimeout(scrollBtm,450));
  }
  // Android Visual Viewport
  if(window.visualViewport){
    window.visualViewport.addEventListener('resize',()=>{
      const offset=window.innerHeight-window.visualViewport.height;
      document.querySelector('.input-area').style.paddingBottom=`calc(8px + ${Math.max(0,offset)}px + var(--sab))`;
      scrollBtm();
    });
  }
}

// ── メッセージ描画 ─────────────────────────────────────
function renderMsg(msg){
  const cont=document.getElementById('messages');
  if(msg.type==='system'){
    const d=document.createElement('div');
    d.className='msg-sys';d.textContent=msg.text;cont.appendChild(d);return;
  }
  const isOwn=msg.userId===(socket?socket.id:null);
  const color=ucolor(msg.username);
  const div=document.createElement('div');
  div.className='msg'+(isOwn?' own':'');
  let content='';
  if(msg.type==='image'&&msg.imageUrl){
    content=`<img src="${esc(msg.imageUrl)}" loading="lazy" onclick="previewImg('${esc(msg.imageUrl)}')" />`;
    if(msg.text) content+=`<div style="margin-top:5px;font-size:13px">${esc(msg.text)}</div>`;
  }else{
    content=esc(msg.text).replace(/\n/g,'<br>');
  }
  div.dataset.msgid = msg.id;
  div.innerHTML=`
    <div class="msg-av" style="background:${color}22;color:${color}">${ini(msg.username)}</div>
    <div class="msg-body">
      <div class="msg-meta"><span class="msg-name">${esc(msg.username)}</span><span class="msg-time">${ft(msg.timestamp)}</span></div>
      <div class="msg-bubble">${content}</div>
      <div class="msg-reads" id="reads-${msg.id}"></div>
    </div>`;
  cont.appendChild(div);
  // 自分以外のメッセージを既読にする
  if(!isOwn && socket) socket.emit('read:ack', { msgId: msg.id });
}

function renderUsers(users){
  const ul=document.getElementById('userList');
  ul.innerHTML='';
  users.forEach(u=>{
    const isSelf=u.id===(socket?socket.id:null);
    const color=ucolor(u.username);
    const div=document.createElement('div');
    div.className='user-item'+(isSelf?' self':'');
    div.innerHTML=`
      <div class="av" style="background:${color}22;color:${color}">${ini(u.username)}</div>
      <span class="uname">${esc(u.username)}${isSelf?' (自分)':''}</span>
      ${!isSelf?`<button class="call-sm" onclick="startCall('${u.id}','${esc(u.username)}')">📞</button>`:''}`;
    ul.appendChild(div);
  });
  document.getElementById('hdStatus').textContent=`${users.length}人オンライン`;
}

function scrollBtm(){
  const el=document.getElementById('messages');
  requestAnimationFrame(()=>{ el.scrollTop=el.scrollHeight; });
}

// ── 送信 ─────────────────────────────────────────────
function sendMsg(){
  const inp=document.getElementById('msgInput');
  const text=inp.value.trim();
  if(!text||!socket) return;
  socket.emit('chat:message',{text});
  inp.value='';inp.style.height='auto';
}

// ── 画像 ─────────────────────────────────────────────
function openFilePicker(){ document.getElementById('fileInput').click(); }

async function uploadAndSend(file){
  const form=new FormData(); form.append('image',file);
  try{
    const res=await fetch('/upload',{method:'POST',body:form});
    const data=await res.json();
    socket.emit('chat:message',{imageUrl:data.imageUrl});
  }catch{ alert('画像のアップロードに失敗しました'); }
}

// ── カメラ ────────────────────────────────────────────
async function openCamera(){
  closeCamera();
  try{
    camStream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:{ideal:'environment'},width:{ideal:1280},height:{ideal:720}},
    });
  }catch{
    try{ camStream=await navigator.mediaDevices.getUserMedia({video:true}); }
    catch{ alert('カメラへのアクセスが拒否されました。\nブラウザ設定でカメラを許可してください。'); return; }
  }
  const vid=document.getElementById('camPreview');
  vid.srcObject=camStream; vid.style.display='block';
  document.getElementById('camCanvas').style.display='none';
  capturedBlob=null;
  document.getElementById('shootBtn').classList.remove('hidden');
  document.getElementById('sendPhotoBtn').classList.add('hidden');
  document.getElementById('retakeBtn').classList.add('hidden');
  document.getElementById('cameraOv').classList.add('show');
}

function capturePhoto(){
  const vid=document.getElementById('camPreview');
  const canvas=document.getElementById('camCanvas');
  canvas.width=vid.videoWidth||640; canvas.height=vid.videoHeight||480;
  canvas.getContext('2d').drawImage(vid,0,0);
  canvas.style.display='block'; vid.style.display='none';
  canvas.toBlob(blob=>{ capturedBlob=blob; },'image/jpeg',0.88);
  stopCamStream();
  document.getElementById('shootBtn').classList.add('hidden');
  document.getElementById('sendPhotoBtn').classList.remove('hidden');
  document.getElementById('retakeBtn').classList.remove('hidden');
}

async function sendCapturedPhoto(){
  if(!capturedBlob) return;
  const file=new File([capturedBlob],`photo_${Date.now()}.jpg`,{type:'image/jpeg'});
  closeCamera(); await uploadAndSend(file);
}

function closeCamera(){
  stopCamStream(); capturedBlob=null;
  document.getElementById('cameraOv').classList.remove('show');
  document.getElementById('camPreview').srcObject=null;
}
function stopCamStream(){ if(camStream){camStream.getTracks().forEach(t=>t.stop());camStream=null;} }

// ── WebRTC ───────────────────────────────────────────
const RTC_CFG={iceServers:[{urls:'stun:stun.l.google.com:19302'},{urls:'stun:stun1.l.google.com:19302'}]};

async function getMedia(){
  try{ return await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:640},height:{ideal:480}},audio:true}); }
  catch{ try{ return await navigator.mediaDevices.getUserMedia({audio:true}); }catch{ return null; } }
}

async function startCall(targetId,targetName){
  callTarget={id:targetId,name:targetName};
  localStream=await getMedia();
  if(!localStream){ alert('マイク/カメラへのアクセスが拒否されました'); return; }
  pc=createPC(targetId);
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  attachLocalVid();
  const offer=await pc.createOffer();
  await pc.setLocalDescription(offer);
  socket.emit('call:offer',{targetId,offer,callerName:myUsername});
  showCallModal(targetName);
  closePanel();
}

async function acceptCall(){
  document.getElementById('incomingOv').classList.remove('show');
  localStream=await getMedia();
  if(!localStream){ socket.emit('call:reject',{targetId:remoteCallerId}); return; }
  pc=createPC(remoteCallerId);
  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));
  attachLocalVid();
  await pc.setRemoteDescription(new RTCSessionDescription(incomingOffer));
  const answer=await pc.createAnswer();
  await pc.setLocalDescription(answer);
  socket.emit('call:answer',{targetId:remoteCallerId,answer});
  const name=document.getElementById('callerName').textContent;
  callTarget={id:remoteCallerId,name};
  showCallModal(name);
}

function rejectCall(){
  socket.emit('call:reject',{targetId:remoteCallerId});
  document.getElementById('incomingOv').classList.remove('show');
}

function endCall(){
  if(callTarget.id) socket.emit('call:end',{targetId:callTarget.id});
  cleanupCall();
}

function createPC(targetId){
  const conn=new RTCPeerConnection(RTC_CFG);
  conn.onicecandidate=({candidate})=>{ if(candidate) socket.emit('call:ice',{targetId,candidate}); };
  conn.ontrack=({streams})=>{
    const v=document.getElementById('remoteVid');
    v.srcObject=streams[0]; v.style.display='block';
    document.getElementById('remoteIco').style.display='none';
    v.play().catch(()=>{});
  };
  conn.onconnectionstatechange=()=>{
    if(['disconnected','failed','closed'].includes(conn.connectionState)) cleanupCall();
  };
  return conn;
}

function attachLocalVid(){
  const v=document.getElementById('localVid');
  v.srcObject=localStream;
  const hasV=localStream.getVideoTracks().length>0;
  v.style.display=hasV?'block':'none';
  document.getElementById('localIco').style.display=hasV?'none':'flex';
  v.play().catch(()=>{});
}

function showCallModal(name){
  document.getElementById('callTitle').textContent=`📞 ${name}`;
  document.getElementById('remoteLbl').textContent=name;
  document.getElementById('remoteVid').style.display='none';
  document.getElementById('remoteIco').style.display='flex';
  document.getElementById('callOv').classList.add('show');
  callSecs=0; updateTimer();
  callTimerID=setInterval(()=>{callSecs++;updateTimer();},1000);
}

function updateTimer(){
  const m=String(Math.floor(callSecs/60)).padStart(2,'0');
  const s=String(callSecs%60).padStart(2,'0');
  document.getElementById('callTimer').textContent=`${m}:${s}`;
}

function cleanupCall(){
  clearInterval(callTimerID);
  if(pc){pc.close();pc=null;}
  if(localStream){localStream.getTracks().forEach(t=>t.stop());localStream=null;}
  document.getElementById('callOv').classList.remove('show');
  document.getElementById('incomingOv').classList.remove('show');
  ['remoteVid','localVid'].forEach(id=>{const v=document.getElementById(id);v.srcObject=null;v.style.display='none';});
  document.getElementById('remoteIco').style.display='flex';
  document.getElementById('localIco').style.display='flex';
  remoteCallerId=null;incomingOffer=null;
  callTarget={id:null,name:''};
  muted=false;vidOff=false;
  const mb=document.getElementById('muteBtn'),vb=document.getElementById('vidBtn');
  mb.classList.remove('on');vb.classList.remove('on');
  mb.textContent='🎙️';vb.textContent='📹';
}

function toggleMute(){
  muted=!muted;
  if(localStream) localStream.getAudioTracks().forEach(t=>{t.enabled=!muted;});
  document.getElementById('muteBtn').textContent=muted?'🔇':'🎙️';
  document.getElementById('muteBtn').classList.toggle('on',muted);
}
function toggleVid(){
  vidOff=!vidOff;
  if(localStream) localStream.getVideoTracks().forEach(t=>{t.enabled=!vidOff;});
  document.getElementById('vidBtn').textContent=vidOff?'🚫':'📹';
  document.getElementById('vidBtn').classList.toggle('on',vidOff);
}

// ── パネル ────────────────────────────────────────────
function openPanel(){ document.getElementById('usersPanel').classList.add('open'); document.getElementById('backdrop').classList.add('show'); }
function closePanel(){ document.getElementById('usersPanel').classList.remove('open'); document.getElementById('backdrop').classList.remove('show'); }

// ── 画像プレビュー ─────────────────────────────────────
function previewImg(src){ document.getElementById('imgFullSrc').src=src; document.getElementById('imgFull').classList.add('show'); }
</script>
